<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>NBStgaer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      label {
        display: block;
        margin-top: 1rem;
        font-weight: 600;
      }
      input,
      textarea {
        width: 100%;
        padding: 0.6rem;
        font: inherit;
        box-sizing: border-box;
      }
      button {
        margin-top: 1rem;
        padding: 0.7rem 1rem;
        font: inherit;
        cursor: pointer;
      }
      pre {
        background: #f5f5f5;
        padding: 1rem;
        overflow-x: auto;
        white-space: pre-wrap;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>NBStgaer</h1>
    <h3>Generate Binder/Jupyter launch URLs to set ENV variables and stage in data file</h3>
    <label>Binder service</label>
    <select id="binderBase" onchange="toggleCustomBinder()">

      <option value="https://mybinder.org">mybinder.org</option>
      <option value="https://replay.notebooks.egi.eu">
        EGI Notebooks Replay
      </option>
      <option value="https://binder.ethz.ch">ETH Binder</option>
      <option value-"https://notebooks.gesis.org/binder">GESIS Binder</option>
      <option value="local">Local JupyterLab: http://localhost:8888</option>
      <option value="custom">Custom…</option>
    </select>

    <div id="customBinderContainer" style="display:none; margin-top:0.5rem;">
      <label>Custom BinderHub URL</label>
      <input
        id="customBinderBase"
        type="url"
        placeholder="https://binder.example.org"
      />
    </div>


    <label>Target Git repo URL</label>
    <input id="targetRepo" placeholder="https://github.com/recap/DataLens" />

    <div class="row">
      <div>
        <label>Target branch</label>
        <input id="branch" value="main" />
      </div>
      <div>
        <label>Notebook path and name</label>
        <input id="notebookpath" placeholder="DataLens.ipynb" />
      </div>
    </div>

    <label><strong>.env</strong> parameters, one per line: KEY=VALUE</label>
    <textarea id="params" rows="5">
CSV_URL=https://example.org/data.csv</textarea
    >

    <label>Stage data files (optional)</label>

<div id="dataFiles"></div>


<button type="button" onclick="addDataFile()">+ Add file</button>

    <br></br>

    <button onclick="buildUrl()">Build URL</button>
    <button onclick="copyUrl()">Copy URL</button>

    <h2>Binder URL</h2>
    <pre id="output"></pre>

    <!-- <h2>Markdown badge</h2> -->
    <!-- <pre id="badge"></pre> -->

    <button onclick="launchBinder()">🚀 Launch Binder</button>

    <script>
    function toggleCustomBinder() {
        const custom =
            document.getElementById("binderBase").value === "custom";

        document.getElementById("customBinderContainer").style.display =
            custom ? "block" : "none";
    }

    function applyDefaultsFromUrl() {
        const params = new URLSearchParams(window.location.search);

        const binder = params.get("binderBase");
        if (!binder)
            return;

        const select = document.getElementById("binderBase");

        // Does it match one of the predefined options?
        const option = [...select.options].find(o => o.value === binder);

        if (option) {
            select.value = binder;
        } else {
            select.value = "custom";
            document.getElementById("customBinderBase").value = binder;
            toggleCustomBinder();
        }
    }

    function addDataFile(url = "", path = "") {
        const container = document.getElementById("dataFiles");

        const row = document.createElement("div");
        row.className = "data-file-row";

        row.innerHTML = `
            <input
                class="data-url"
                placeholder="File URL e.g. https://example.org/data.csv"
                value="${url}"
            />
            <br></br>

            <input
                class="data-path"
                placeholder="Save as e.g. data/data.csv"
                value="${path}"
            />

            <button type="button" onclick="this.parentElement.remove()">✕</button>
        `;

        const urlInput = row.querySelector(".data-url");
        const pathInput = row.querySelector(".data-path");

        // Automatically suggest a filename while typing,
        // but don't overwrite if the user has edited it.
        urlInput.addEventListener("input", () => {
            if (pathInput.dataset.userEdited === "true") {
                return;
            }

            try {
                const u = new URL(urlInput.value);

                let filename = u.pathname.split("/").pop();

                if (!filename)
                    filename = "downloaded_file";

                pathInput.value = filename;
            } catch {
                // Ignore invalid URLs while typing
            }
        });

        pathInput.addEventListener("input", () => {
            pathInput.dataset.userEdited = "true";
        });

        container.appendChild(row);
    }

    function buildDataJson() {
        const rows = document.querySelectorAll(".data-file-row");

        const data = [];

        rows.forEach(row => {
            const url = row.querySelector(".data-url").value.trim();
            const path = row.querySelector(".data-path").value.trim();

            if (!url) return;

            const file = { url };

            if (path)
                file.path = path;

            data.push(file);
        });

        return data.length ? JSON.stringify(data) : null;
    }

      function launchBinder() {
          buildUrl();

          const url = document.getElementById("output").textContent.trim();

          if (!url) {
              alert("Please build the Binder URL first.");
              return;
          }

          window.open(url, "_blank", "noopener");
      }

    function parseRepoForBinder(repoUrl) {
      const raw = repoUrl.trim().replace(/\/$/, "");

      // GitHub HTTPS
      let m = raw.match(/^https?:\/\/github\.com\/([^/]+)\/([^/.]+)(?:\.git)?$/);
      if (m) return `gh/${m[1]}/${m[2]}`;

      // GitHub SSH
      m = raw.match(/^git@github\.com:([^/]+)\/([^/.]+)(?:\.git)?$/);
      if (m) return `gh/${m[1]}/${m[2]}`;

      // GitLab HTTPS
      m = raw.match(/^https?:\/\/gitlab\.com\/(.+?)(?:\.git)?$/);
      if (m) return `gl/${m[1]}`;

      // GitLab SSH
      m = raw.match(/^git@gitlab\.com:(.+?)(?:\.git)?$/);
      if (m) return `gl/${m[1]}`;

      // Generic Git URL
      return `git/${encodeURIComponent(raw)}`;
    }

      function buildUrl() {
        
        const inner = new URLSearchParams();

        const targetRepo = document.getElementById("targetRepo").value.trim();
        const repoForBinder = parseRepoForBinder(targetRepo);
        const branch = document.getElementById("branch").value.trim();
        const notebookpath = document
          .getElementById("notebookpath")
          .value.trim();
        const paramsText = document.getElementById("params").value.trim();

        const dataJson = buildDataJson();

        if (dataJson) {
            inner.set("data", dataJson);
        }

        inner.set("repo", targetRepo);
        if (branch) inner.set("branch", branch);
        if (notebookpath) inner.set("notebookpath", notebookpath);

        for (const line of paramsText.split("\n")) {
          if (!line.trim()) continue;
          const idx = line.indexOf("=");
          if (idx === -1) continue;
          const key = line.slice(0, idx).trim();
          const value = line.slice(idx + 1).trim();
          if (key) inner.set(key, value);
        }

        const launchUrlpath = "launch?" + inner.toString();

        let binderBase = document.getElementById("binderBase").value;

        if (binderBase === "local") {
          const localUrl = `http://localhost:8888/${launchUrlpath}`;
          document.getElementById("output").textContent = localUrl;
          return localUrl;
        }


        if (binderBase === "custom") {
            binderBase = document.getElementById("customBinderBase").value.trim();

            if (!binderBase) {
                alert("Please enter a BinderHub URL.");
                return;
            }
        }

        binderBase = binderBase.replace(/\/$/, "");

        const binderUrl =
        `${binderBase}/v2/${repoForBinder}/${branch}` +
          `?urlpath=${encodeURIComponent(launchUrlpath)}`;

        document.getElementById("output").textContent = binderUrl;
      }

      async function copyUrl() {
        const url = document.getElementById("output").textContent;
        await navigator.clipboard.writeText(url);
        alert("Copied Binder URL");
      }

      applyDefaultsFromUrl();
      buildUrl();
      addDataFile();
    </script>
  </body>
</html>
